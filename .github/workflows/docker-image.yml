name: Build and publish Docker images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ims
        ports:
          - 5432:5432
        options: >
          --health-cmd "pg_isready -U postgres -d ims"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_URI: postgresql+asyncpg://postgres:postgres@localhost:5432/ims
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Wait for PostgreSQL
        run: |
          python - <<'PY'
          import asyncio
          from sqlalchemy import text
          from app.db.postgres import engine

          async def wait_for_db():
              for attempt in range(1, 31):
                  try:
                      async with engine.begin() as conn:
                          await conn.execute(text('SELECT 1'))
                      print('PostgreSQL is ready.')
                      return
                  except Exception as exc:
                      print(f'Waiting for database ({attempt}/30): {exc}')
                      await asyncio.sleep(2)
              raise SystemExit('PostgreSQL did not become ready in time.')

          asyncio.run(wait_for_db())
          PY
        working-directory: backend

      - name: Create backend database schema
        run: |
          python - <<'PY'
          import asyncio
          from app.db.postgres import engine
          from app.models.incident import Base as IncidentBase
          from app.models.rca import RCA  # noqa: F401
          from app.models.attachment import Attachment  # noqa: F401

          async def init():
              async with engine.begin() as conn:
                  await conn.run_sync(IncidentBase.metadata.create_all)
              print('Database schema created.')

          asyncio.run(init())
          PY
        working-directory: backend

      - name: Run backend tests
        run: |
          cd backend
          pytest app/tests

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend assets
        working-directory: frontend
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/incident-management-backend:latest
            ghcr.io/${{ github.repository_owner }}/incident-management-backend:${{ github.sha }}

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/incident-management-frontend:latest
            ghcr.io/${{ github.repository_owner }}/incident-management-frontend:${{ github.sha }}
